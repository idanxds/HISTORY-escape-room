<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתר היומנים</title>
    <style>
        /* איפוס הגדרות בסיסיות */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-container {
            position: relative;
            width: 100%; /* תופס את כל רוחב המסך במחשב */
            max-width: 1200px; /* הגבלת רוחב מקסימלי כדי שלא יימרח מדי במסכי ענק */
            margin: 0 auto;
        }

        /* תמונת הרקע מתאימה את עצמה לרוחב */
        #bg-image {
            width: 100%;
            height: auto;
            display: block;
        }

        area {
            cursor: pointer;
        }

        /* הגדרות לחלון הקופץ (Modal) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow-y: auto; /* מאפשר גלילה אם התמונה ארוכה מהמסך */
        }

        /* כשהמודאל פעיל */
        .modal.show {
            display: flex;
            opacity: 1;
            align-items: flex-start; /* מתחיל מלמעלה כדי לאפשר גלילה נוחה בנייד */
            justify-content: center;
            padding-top: 5vh; /* מרווח קטן מלמעלה */
            padding-bottom: 5vh;
        }

        /* תוכן המודאל - התמונה הגדולה */
        .modal-content {
            position: relative;
            width: 95%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

        .modal-content img {
            width: 100%;
            height: auto; /* מאפשר לתמונה לגדול בהתאם לרוחב ולשמור על פרופורציות */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* כפתור סגירה */
        .close-btn {
            position: absolute;
            top: -45px;
            right: 0;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.3s;
            z-index: 1001;
        }

        .close-btn:hover {
            color: #ff4c4c;
        }

        /* התאמות ספציפיות למחשב (מסכים רחבים) */
        @media (min-width: 768px) {
            .modal.show {
                align-items: center;
                padding-top: 0;
            }
            .modal-content img {
                width: auto;
                max-width: 100%;
                max-height: 90vh; /* במחשב נשמור את התמונה בתוך גבולות המסך */
            }
            .close-btn {
                top: -30px;
                right: -30px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="https://i.ibb.co/fznSfYzs/Whats-App-Image-2026-03-15-at-17-55-25-1.jpg" alt="Background" usemap="#diary-map" id="bg-image">

        <map name="diary-map" id="diary-map">
            <area target="" alt="יומן 1 - חלק א" title="יומן 1" href="javascript:void(0);" data-coords="363,82,341,124,464,181,486,132" coords="363,82,341,124,464,181,486,132" shape="poly" onclick="openModal('modal1')">
            <area target="" alt="יומן 1 - חלק ב" title="יומן 1" href="javascript:void(0);" data-coords="410,153,390,193,444,217,464,179" coords="410,153,390,193,444,217,464,179" shape="poly" onclick="openModal('modal1')">
            
            <area target="" alt="יומן 2" title="יומן 2" href="javascript:void(0);" data-coords="184,58,151,1,14,0,1,14,7,28,0,82,82,124,108,121,169,79,168,81" coords="184,58,151,1,14,0,1,14,7,28,0,82,82,124,108,121,169,79,168,81" shape="poly" onclick="openModal('modal2')">
            
            <area target="" alt="יומן 3" title="יומן 3" href="javascript:void(0);" data-coords="36,155,126,125,148,140,173,238,159,261,67,278" coords="36,155,126,125,148,140,173,238,159,261,67,278" shape="poly" onclick="openModal('modal3')">
        </map>
    </div>

    <div id="modal1" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('modal1')">&times;</button>
            <img src="https://i.ibb.co/M5SpFXmb/Whats-App-Image-2026-03-17-at-12-17-00.jpg" alt="יומן פתוח 1">
        </div>
    </div>

    <div id="modal2" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('modal2')">&times;</button>
            <img src="https://i.ibb.co/KxZKm7yk/Whats-App-Image-2026-03-17-at-12-16-59-1.jpg" alt="יומן פתוח 2">
        </div>
    </div>

    <div id="modal3" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('modal3')">&times;</button>
            <img src="https://i.ibb.co/B5SRQS26/Whats-App-Image-2026-03-17-at-12-16-59.jpg" alt="יומן פתוח 3">
        </div>
    </div>

    <script>
        // --- מערכת התאמת מפת התמונה למסכים שונים ---
        function resizeImageMap() {
            const img = document.getElementById('bg-image');
            const areas = document.querySelectorAll('map[name="diary-map"] area');
            
            // הרוחב והגובה המקוריים של התמונה כפי שהועלתה
            const originalWidth = 502; 
            const originalHeight = 312;

            if (!img.clientWidth) return;

            // חישוב יחס ההקטנה/הגדלה הנוכחי
            const scaleX = img.clientWidth / originalWidth;
            const scaleY = img.clientHeight / originalHeight;

            areas.forEach(area => {
                const originalCoords = area.getAttribute('data-coords').split(',');
                const newCoords = originalCoords.map((coord, index) => {
                    // קואורדינטות זוגיות הן X, אי-זוגיות הן Y
                    return Math.round(coord * (index % 2 === 0 ? scaleX : scaleY));
                });
                area.setAttribute('coords', newCoords.join(','));
            });
        }

        // הפעלת הפונקציה בטעינה ובכל שינוי של גודל החלון
        window.addEventListener('resize', resizeImageMap);
        window.addEventListener('load', resizeImageMap);
        // טיפול במקרה שהתמונה נטענת אחרי ה-DOM
        document.getElementById('bg-image').onload = resizeImageMap;


        // --- מערכת החלונות הקופצים (Modals) ---
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('show');
            document.body.style.overflow = 'hidden'; // מונע גלילה של רקע האתר כשמודאל פתוח
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('show');
            document.body.style.overflow = ''; // החזרת אפשרות הגלילה לרקע
            setTimeout(() => {
                modal.style.display = 'none';
                modal.style.display = ''; 
            }, 300);
        }

        // סגירת המודאל בלחיצה מחוץ לתמונה
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal(event.target.id);
            }
        }
    </script>
</body>
</html>
