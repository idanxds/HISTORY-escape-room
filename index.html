<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתר היומנים</title>
    <style>
        /* איפוס הגדרות בסיסיות */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh; /* במחשב יתפוס בדיוק את כל גובה ורוחב המסך */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* תמונת הרקע נמתחת על כל המסך */
        #bg-image {
            width: 100%;
            height: 100%;
            object-fit: fill; /* מבטיח מתיחה מלאה של התמונה על כל המסך במחשב */
            display: block;
        }

        area {
            cursor: pointer;
        }

        /* --- הגדרות חלון קופץ (Modal) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9); /* רקע כהה יותר לקריאה נוחה */
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow-y: auto; /* מאפשר גלילה אם התמונה ארוכה */
        }

        .modal.show {
            display: flex;
            opacity: 1;
            align-items: flex-start;
            justify-content: center;
            padding-top: 0; 
        }

        /* תוכן המודאל - תמונת היומן */
        .modal-content {
            position: relative;
            width: 100%; /* תופס 100% רוחב כדי למקסם גודל בנייד */
            max-width: 900px; /* במחשב לא יעבור את ה-900 פיקסלים */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: auto;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            border-radius: 0; /* ללא פינות מעוגלות בנייד כדי לנצל כל פיקסל */
        }

        /* כפתור סגירה מקובע למסך - תמיד יופיע למעלה גם כשגוללים */
        .close-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 35px;
            line-height: 40px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #fff;
            transition: background-color 0.3s, color 0.3s;
            z-index: 1001;
            padding: 0;
        }

        .close-btn:hover {
            background-color: #ff4c4c;
            color: #fff;
            border-color: #ff4c4c;
        }

        /* --- התאמות ספציפיות --- */
        
        /* התאמה למחשב (מסכים רחבים) */
        @media (min-width: 768px) {
            .modal.show {
                align-items: center; /* במחשב ממרכז את היומן גם לאורך */
                padding: 20px;
            }
            .modal-content img {
                width: auto;
                max-width: 100%;
                max-height: 95vh; /* במחשב נשמור את התמונה בתוך גבולות המסך */
                border-radius: 8px; /* במחשב נחזיר פינות מעוגלות */
                box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            }
        }

        /* התאמה לנייד (טלפונים) */
        @media (max-width: 767px) {
            .main-container {
                height: auto;
                min-height: 100vh;
            }
            #bg-image {
                height: auto; /* מחזיר לפרופורציות מקוריות בנייד כדי שלא יימעך */
                object-fit: contain;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="https://i.ibb.co/fznSfYzs/Whats-App-Image-2026-03-15-at-17-55-25-1.jpg" alt="Background" usemap="#diary-map" id="bg-image">

        <map name="diary-map" id="diary-map">
            <area target="" alt="יומן 1 - חלק א" title="יומן 1" href="javascript:void(0);" data-coords="363,82,341,124,464,181,486,132" coords="363,82,341,124,464,181,486,132" shape="poly" onclick="openModal('modal1')">
            <area target="" alt="יומן 1 - חלק ב" title="יומן 1" href="javascript:void(0);" data-coords="410,153,390,193,444,217,464,179" coords="410,153,390,193,444,217,464,179" shape="poly" onclick="openModal('modal1')">
            
            <area target="" alt="יומן 2" title="יומן 2" href="javascript:void(0);" data-coords="184,58,151,1,14,0,1,14,7,28,0,82,82,124,108,121,169,79,168,81" coords="184,58,151,1,14,0,1,14,7,28,0,82,82,124,108,121,169,79,168,81" shape="poly" onclick="openModal('modal2')">
            
            <area target="" alt="יומן 3" title="יומן 3" href="javascript:void(0);" data-coords="36,155,126,125,148,140,173,238,159,261,67,278" coords="36,155,126,125,148,140,173,238,159,261,67,278" shape="poly" onclick="openModal('modal3')">
        </map>
    </div>

    <div id="modal1" class="modal">
        <button class="close-btn" onclick="closeModal('modal1')">&times;</button>
        <div class="modal-content">
            <img src="https://i.ibb.co/M5SpFXmb/Whats-App-Image-2026-03-17-at-12-17-00.jpg" alt="יומן פתוח 1">
        </div>
    </div>

    <div id="modal2" class="modal">
        <button class="close-btn" onclick="closeModal('modal2')">&times;</button>
        <div class="modal-content">
            <img src="https://i.ibb.co/KxZKm7yk/Whats-App-Image-2026-03-17-at-12-16-59-1.jpg" alt="יומן פתוח 2">
        </div>
    </div>

    <div id="modal3" class="modal">
        <button class="close-btn" onclick="closeModal('modal3')">&times;</button>
        <div class="modal-content">
            <img src="https://i.ibb.co/B5SRQS26/Whats-App-Image-2026-03-17-at-12-16-59.jpg" alt="יומן פתוח 3">
        </div>
    </div>

    <script>
        // --- מערכת חישוב הקואורדינטות הדינמית ---
        function resizeImageMap() {
            const img = document.getElementById('bg-image');
            const areas = document.querySelectorAll('map[name="diary-map"] area');
            
            // הרוחב והגובה של תמונת המקור
            const originalWidth = 502; 
            const originalHeight = 312;

            if (!img.clientWidth || !img.clientHeight) return;

            // החישוב מתבצע בנפרד לרוחב ולגובה - כך גם אם התמונה נמתחת במחשב, הקואורדינטות יתיישרו בדיוק מושלם
            const scaleX = img.clientWidth / originalWidth;
            const scaleY = img.clientHeight / originalHeight;

            areas.forEach(area => {
                const originalCoords = area.getAttribute('data-coords').split(',');
                const newCoords = originalCoords.map((coord, index) => {
                    return Math.round(coord * (index % 2 === 0 ? scaleX : scaleY));
                });
                area.setAttribute('coords', newCoords.join(','));
            });
        }

        // האזנה לשינויי גודל מסך
        window.addEventListener('resize', resizeImageMap);
        window.addEventListener('load', resizeImageMap);
        document.getElementById('bg-image').onload = resizeImageMap;


        // --- מערכת פתיחה וסגירה של היומנים ---
        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('show');
            document.body.style.overflow = 'hidden'; // עוצר גלילה של הרקע כשיומן פתוח
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('show');
            document.body.style.overflow = ''; 
            setTimeout(() => {
                modal.style.display = 'none';
                modal.style.display = ''; 
            }, 300);
        }

        // סגירה בלחיצה על הרקע הכהה מסביב ליומן
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                closeModal(event.target.id);
            }
        }
    </script>
</body>
</html>
